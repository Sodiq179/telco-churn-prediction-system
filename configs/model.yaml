active_model: random_forest #xgboost

tracking:
  experiment_prefix: telco_churn

tuning:
  enabled: true
  n_trials: 50
  optimization_metric: recall
  direction: maximize
  threshold: 0.5

models:
  xgboost:
    estimator_class: XGBClassifier
    library: xgboost
    params:
      objective: binary:logistic
      eval_metric: auc
      random_state: 42
      n_jobs: -1
      tree_method: hist
    search_space:
      n_estimators:
        type: int
        low: 100
        high: 500
      max_depth:
        type: int
        low: 3
        high: 10
      scale_pos_weight:
        type: float
        low: 2.0
        high: 3.5
      learning_rate:
        type: float
        low: 0.01
        high: 0.3
        log: true
      subsample:
        type: float
        low: 0.6
        high: 1.0
      colsample_bytree:
        type: float
        low: 0.6
        high: 1.0
      min_child_weight:
        type: int
        low: 1
        high: 10
      gamma:
        type: float
        low: 0.0
        high: 5.0
      reg_alpha:
        type: float
        low: 1.0e-4
        high: 10.0
        log: true
      reg_lambda:
        type: float
        low: 1.0e-4
        high: 10.0
        log: true

  random_forest:
    estimator_class: RandomForestClassifier
    library: sklearn
    params:
      n_estimators: 200
      random_state: 42
      n_jobs: -1
      class_weight: balanced
    search_space:
      n_estimators:
        type: int
        low: 100
        high: 500
      max_depth:
        type: int
        low: 3
        high: 20
      min_samples_split:
        type: int
        low: 2
        high: 20
      min_samples_leaf:
        type: int
        low: 1
        high: 10
      max_features:
        type: categorical
        choices: ["sqrt", "log2", null]

  lightgbm:
    estimator_class: LGBMClassifier
    library: lightgbm
    params:
      objective: binary
      metric: auc
      random_state: 42
      n_jobs: -1
      verbosity: -1
    search_space:
      n_estimators:
        type: int
        low: 100
        high: 500
      max_depth:
        type: int
        low: 3
        high: 12
      learning_rate:
        type: float
        low: 0.01
        high: 0.3
        log: true
      num_leaves:
        type: int
        low: 20
        high: 150
      subsample:
        type: float
        low: 0.6
        high: 1.0
      colsample_bytree:
        type: float
        low: 0.6
        high: 1.0
      reg_alpha:
        type: float
        low: 1.0e-4
        high: 10.0
        log: true
      reg_lambda:
        type: float
        low: 1.0e-4
        high: 10.0
        log: true
      scale_pos_weight:
        type: float
        low: 2.0
        high: 4.0
        log: true